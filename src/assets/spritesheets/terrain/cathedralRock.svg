<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 144">
  <defs>
    <radialGradient id="rock-center" cx="50%" cy="66%" r="40%">
      <stop offset="0%" stop-color="#262626" />
      <stop offset="100%" stop-color="#141414" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="bone-light" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b5a996" />
      <stop offset="100%" stop-color="#595246" />
    </linearGradient>
    <linearGradient id="bone-dark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#595246" />
      <stop offset="100%" stop-color="#1f1c18" />
    </linearGradient>
  </defs>

  <!-- Base 3D Geometry -->
  <polygon points="0,96 64,128 64,144 0,112" fill="#141414" stroke="#141414" stroke-width="1" />
  <polygon points="64,128 128,96 128,112 64,144" fill="#050505" stroke="#050505" stroke-width="1" />
  <polygon points="64,64 128,96 64,128 0,96" fill="#141414" stroke="#141414" stroke-width="1" stroke-linejoin="round" />
  <polygon points="64,64 128,96 64,128 0,96" fill="url(#rock-center)" />

  <!-- Background Spikes -->
  <polygon points="40,80 50,70 30,25 25,75" fill="url(#bone-dark)" />
  <polygon points="40,80 50,70 30,25" fill="url(#bone-light)" />
  
  <polygon points="90,85 100,75 110,35 85,80" fill="url(#bone-dark)" />
  <polygon points="90,85 100,75 110,35" fill="url(#bone-light)" />

  <!-- Main Cathedral Rock -->
  <polygon points="64,105 85,90 64,10 45,90" fill="url(#bone-dark)" />
  <polygon points="64,105 85,90 64,10" fill="url(#bone-light)" />
  
  <!-- Gothic detailing / Ribbing on main rock -->
  <path d="M 64,10 L 64,105" stroke="#141414" stroke-width="1.5" />
  <path d="M 54,50 L 64,40 L 75,55" fill="none" stroke="#1f1c18" stroke-width="1" />
  <path d="M 50,70 L 64,60 L 79,75" fill="none" stroke="#1f1c18" stroke-width="1" />
</svg>
