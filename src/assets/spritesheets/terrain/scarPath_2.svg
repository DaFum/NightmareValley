<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 144">
  <defs>
    <filter id="blood-glow" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="2" result="blur" /><feComposite in="SourceGraphic" in2="blur" operator="over" /></filter>
  </defs>
  <polygon points="0,96 64,128 64,144 0,112" fill="#2a1414" stroke="#2a1414" stroke-width="1" />
  <polygon points="64,128 128,96 128,112 64,144" fill="#170909" stroke="#170909" stroke-width="1" />
  <polygon points="64,64 128,96 64,128 0,96" fill="#3d1c1c" stroke="#3d1c1c" stroke-width="1" stroke-linejoin="round" />

  <!-- FIXIERTE ANSCHLÜSSE: SW(32,112) zu NE(96,80) -->
  <!-- V2: Sehr zerstörter Pfad, Wellenform -->
  <path d="M 16,104 Q 40,85 64,100 Q 80,100 112,88 L 96,80 L 80,72 Q 60,65 40,85 Q 24,90 16,104 Z" fill="#2b0f0f" />
  <!-- Verstreutere Cobblestones -->
  <path d="M 35,95 L 42,90 L 40,98 Z" fill="#8c8579" />
  <path d="M 60,95 L 68,90 L 70,95 L 62,100 Z" fill="#b5ab9a" />
  <path d="M 85,80 L 92,75 L 94,80 L 87,85 Z" fill="#a1998b" />

  <!-- Die Blutlinie macht einen Bogen, trifft aber EXAKT auf 32,112 und 96,80 -->
  <path d="M 32,112 Q 64,110 64,96 Q 64,82 96,80" fill="none" stroke="#b80f0f" stroke-width="2.5" filter="url(#blood-glow)" opacity="0.8" />
  <path d="M 32,112 Q 64,110 64,96 Q 64,82 96,80" fill="none" stroke="#ff2a2a" stroke-width="1" filter="url(#blood-glow)" opacity="0.9" />
</svg>
