<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 144">
  <defs>
    <filter id="blood-drop-glow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="1.5" result="blur" /><feComposite in="SourceGraphic" in2="blur" operator="over" /></filter>
  </defs>
  <polygon points="0,96 64,128 64,144 0,112" fill="#1c0d0d" stroke="#1c0d0d" stroke-width="1" />
  <polygon points="64,128 128,96 128,112 64,144" fill="#0a0505" stroke="#0a0505" stroke-width="1" />
  <polygon points="64,64 128,96 64,128 0,96" fill="#2b1414" stroke="#2b1414" stroke-width="1" stroke-linejoin="round" />
  <!-- V2: Ein massiver, zentraler Stumpf mit dicken Wurzeln -->
