<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 144">
  <defs>
    <filter id="lake-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <linearGradient id="fluid-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c4ba3d" />
      <stop offset="100%" stop-color="#827a1c" />
    </linearGradient>
  </defs>

  <!-- Base 3D Geometry (Flesh/Bone Rim) -->
  <polygon points="0,96 64,128 64,144 0,112" fill="#2b1414" stroke="#2b1414" stroke-width="1" />
  <polygon points="64,128 128,96 128,112 64,144" fill="#140909" stroke="#140909" stroke-width="1" />
  <polygon points="64,64 128,96 64,128 0,96" fill="#4a2121" stroke="#4a2121" stroke-width="1" stroke-linejoin="round" />

  <!-- Outer Lake Rim (darker flesh) -->
  <path d="M 64,68 Q 105,78 120,96 Q 105,114 64,124 Q 23,114 8,96 Q 23,78 64,68 Z" fill="#2e1111" />

  <!-- The Sickly Yellow Lake -->
  <path d="M 64,72 Q 100,80 112,96 Q 100,112 64,120 Q 28,112 16,96 Q 28,80 64,72 Z" fill="url(#fluid-grad)" filter="url(#lake-glow)" opacity="0.85" />
  
  <!-- Inner depth / waves -->
  <path d="M 64,78 Q 90,85 100,96 Q 90,107 64,112 Q 38,107 28,96 Q 38,85 64,78 Z" fill="#d1c95e" opacity="0.4" />
  
  <!-- Floating Biological Debris -->
  <circle cx="45" cy="96" r="4.5" fill="#6e1313" />
  <circle cx="44" cy="95" r="2" fill="#8a2020" />
  
  <path d="M 80,98 Q 85,95 90,102 Q 82,105 80,98 Z" fill="#4a0909" />
  
  <circle cx="68" cy="85" r="3" fill="#8a2020" />
  <circle cx="60" cy="110" r="2.5" fill="#6e1313" />
</svg>
