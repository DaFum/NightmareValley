<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 144">
  <defs>
    <filter id="flesh-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" /><feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <radialGradient id="mass-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#b80f0f" /><stop offset="70%" stop-color="#6e1313" /><stop offset="100%" stop-color="#2b0505" />
    </radialGradient>
  </defs>
  <polygon points="0,96 64,128 64,144 0,112" fill="#2a1414" stroke="#2a1414" stroke-width="1" />
  <polygon points="64,128 128,96 128,112 64,144" fill="#170909" stroke="#170909" stroke-width="1" />
  <polygon points="64,64 128,96 64,128 0,96" fill="#3d1c1c" stroke="#3d1c1c" stroke-width="1" stroke-linejoin="round" />

  <!-- FIXIERTE ANSCHLÜSSE (NW, NE, SW, SE) -->
  <path d="M 64,96 Q 48,88 32,80" fill="none" stroke="#b80f0f" stroke-width="2.5" filter="url(#flesh-glow)" />
  <path d="M 64,96 Q 80,88 96,80" fill="none" stroke="#d61a1a" stroke-width="2.5" filter="url(#flesh-glow)" />
  <path d="M 64,96 Q 48,104 32,112" fill="none" stroke="#b80f0f" stroke-width="2" />
  <path d="M 64,96 Q 80,104 96,112" fill="none" stroke="#9c1c1c" stroke-width="2" />

  <!-- V1: Solider zentraler Knoten -->
  <path d="M 45,96 Q 45,82 64,82 Q 85,82 85,96 Q 85,115 64,115 Q 45,115 45,96 Z" fill="url(#mass-grad)" />
  <circle cx="52" cy="90" r="4" fill="#ff4545" filter="url(#flesh-glow)" /><circle cx="51" cy="89" r="1.5" fill="#ffffff" opacity="0.6" />
  <circle cx="75" cy="100" r="4.5" fill="#ff4545" filter="url(#flesh-glow)" /><circle cx="74" cy="99" r="2" fill="#ffffff" opacity="0.5" />
</svg>
