<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 144">
  <defs>
    <filter id="flesh-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <radialGradient id="mass-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#b80f0f" />
      <stop offset="70%" stop-color="#6e1313" />
      <stop offset="100%" stop-color="#2b0505" />
    </radialGradient>
  </defs>

  <!-- Base 3D Geometry (Scarred Earth Base) -->
  <polygon points="0,96 64,128 64,144 0,112" fill="#2a1414" stroke="#2a1414" stroke-width="1" />
  <polygon points="64,128 128,96 128,112 64,144" fill="#170909" stroke="#170909" stroke-width="1" />
  <polygon points="64,64 128,96 64,128 0,96" fill="#3d1c1c" stroke="#3d1c1c" stroke-width="1" stroke-linejoin="round" />

  <!-- Spreading Veins -->
  <path d="M 64,96 Q 30,110 10,105" fill="none" stroke="#b80f0f" stroke-width="2" filter="url(#flesh-glow)" />
  <path d="M 64,96 Q 100,110 120,90" fill="none" stroke="#d61a1a" stroke-width="2" filter="url(#flesh-glow)" />
  <path d="M 64,96 Q 40,70 30,80" fill="none" stroke="#b80f0f" stroke-width="1.5" />
  <path d="M 64,96 Q 90,60 100,75" fill="none" stroke="#9c1c1c" stroke-width="1.5" />

  <!-- Fleshy Mass / Hive -->
  <path d="M 45,96 Q 45,75 64,75 Q 85,75 85,96 Q 85,115 64,115 Q 45,115 45,96 Z" fill="url(#mass-grad)" />
  
  <!-- Pulsing nodes -->
  <circle cx="55" cy="88" r="4" fill="#ff4545" filter="url(#flesh-glow)" />
  <circle cx="72" cy="98" r="5" fill="#ff4545" filter="url(#flesh-glow)" />
  <circle cx="64" cy="85" r="3" fill="#ff7a7a" filter="url(#flesh-glow)" />

  <!-- Surface details -->
  <path d="M 50,96 Q 64,85 75,96" fill="none" stroke="#4a0909" stroke-width="2" />
  <path d="M 55,105 Q 64,110 70,102" fill="none" stroke="#4a0909" stroke-width="1.5" />
</svg>
