<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 144">
  <defs>
    <filter id="magma-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Base 3D Geometry -->
  <polygon points="0,96 64,128 64,144 0,112" fill="#2a1414" stroke="#2a1414" stroke-width="1" />
  <polygon points="64,128 128,96 128,112 64,144" fill="#170909" stroke="#170909" stroke-width="1" />
  <polygon points="64,64 128,96 64,128 0,96" fill="#3d1c1c" stroke="#3d1c1c" stroke-width="1" stroke-linejoin="round" />

  <!-- Surface Texture (Subtle dark spots) -->
  <polygon points="64,70 80,80 64,90 48,80" fill="#2e1414" />
  <polygon points="30,90 45,100 35,105 20,95" fill="#331616" />
  <polygon points="100,90 115,100 105,105 90,95" fill="#331616" />

  <!-- Glowing Scars / Cracks -->
  <!-- Main Fault Line -->
  <path d="M 20,96 L 35,92 L 50,105 L 64,96 L 85,102 L 95,90 L 115,96" fill="none" stroke="#8a0303" stroke-width="3" filter="url(#magma-glow)" />
  <path d="M 20,96 L 35,92 L 50,105 L 64,96 L 85,102 L 95,90 L 115,96" fill="none" stroke="#ff4545" stroke-width="1" />

  <!-- Branching Cracks -->
  <path d="M 50,105 L 60,115 L 55,122" fill="none" stroke="#8a0303" stroke-width="2" filter="url(#magma-glow)" />
  <path d="M 50,105 L 60,115 L 55,122" fill="none" stroke="#ff4545" stroke-width="0.75" />

  <path d="M 85,102 L 90,115 L 105,120" fill="none" stroke="#8a0303" stroke-width="2" filter="url(#magma-glow)" />
  <path d="M 85,102 L 90,115 L 105,120" fill="none" stroke="#ff4545" stroke-width="0.75" />

  <path d="M 64,96 L 70,82 L 60,70" fill="none" stroke="#b80f0f" stroke-width="1.5" filter="url(#magma-glow)" />
  <path d="M 64,96 L 70,82 L 60,70" fill="none" stroke="#ff7a7a" stroke-width="0.5" />
</svg>
